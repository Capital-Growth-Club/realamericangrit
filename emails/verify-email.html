<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <meta name="supported-color-schemes" content="light dark" />
  <title>Verify Your Email</title>
</head>
<body style="margin:0;padding:0;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;-webkit-text-size-adjust:none;background-color:#e5e7eb;">
  <!-- Outer wrapper — neutral gray that works on both light & dark -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#e5e7eb;">
    <tr>
      <td align="center" style="padding:32px 16px;">

        <!-- Card -->
        <table role="presentation" cellpadding="0" cellspacing="0" style="max-width:480px;width:100%;border-radius:16px;overflow:hidden;background-color:#0a1628;">

          <!-- Tricolor stripe top -->
          <tr>
            <td style="padding:0;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td width="33.33%" style="height:4px;background-color:#b71c1c;"></td>
                  <td width="33.33%" style="height:4px;background-color:#ffffff;"></td>
                  <td width="33.34%" style="height:4px;background-color:#1a3a6b;"></td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Content -->
          <tr>
            <td style="padding:48px 32px 40px;background-color:#0a1628;">

              <!-- Logo -->
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto 32px;">
                <tr>
                  <td style="width:40px;height:40px;background-color:#b71c1c;border-radius:50%;text-align:center;vertical-align:middle;">
                    <span style="color:#ffffff;font-size:13px;font-weight:900;letter-spacing:-0.5px;">RAG</span>
                  </td>
                  <td style="padding-left:10px;">
                    <span style="color:#ffffff;font-size:15px;font-weight:800;letter-spacing:-0.2px;">REAL AMERICAN GRIT</span>
                  </td>
                </tr>
              </table>

              <!-- Heading -->
              <h1 style="margin:0 0 8px;color:#ffffff;font-size:26px;font-weight:900;text-align:center;letter-spacing:-0.5px;line-height:1.2;">
                Verify Your Email
              </h1>
              <p style="margin:0 0 32px;color:#94a3b8;font-size:15px;text-align:center;line-height:1.5;">
                Enter the code below to confirm your spot on the pre-register list.
              </p>

              <!-- Code box -->
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto 32px;">
                <tr>
                  <td style="background-color:#ffffff;border-radius:12px;padding:20px 40px;text-align:center;">
                    <span style="font-size:36px;font-weight:900;letter-spacing:8px;color:#0a1628;font-family:'Courier New',monospace;">{{twilio_code}}</span>
                  </td>
                </tr>
              </table>

              <p style="margin:0 0 4px;color:#94a3b8;font-size:13px;text-align:center;line-height:1.5;">
                This code expires in 10 minutes.
              </p>
              <p style="margin:0 0 32px;color:#64748b;font-size:13px;text-align:center;line-height:1.5;">
                If you didn't request this, you can safely ignore this email.
              </p>

              <!-- Divider -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="height:1px;background-color:#1e293b;"></td>
                </tr>
              </table>

              <!-- Footer -->
              <p style="margin:24px 0 0;color:#64748b;font-size:12px;text-align:center;line-height:1.5;">
                Real American Grit &middot; info@realamericangrit.com
              </p>
            </td>
          </tr>

          <!-- Tricolor stripe bottom -->
          <tr>
            <td style="padding:0;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td width="33.33%" style="height:4px;background-color:#b71c1c;"></td>
                  <td width="33.33%" style="height:4px;background-color:#ffffff;"></td>
                  <td width="33.34%" style="height:4px;background-color:#1a3a6b;"></td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
        <!-- /Card -->

      </td>
    </tr>
  </table>
</body>
</html>
